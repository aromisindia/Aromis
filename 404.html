<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found - Aromis</title>

    <meta name="description" content="The page you are looking for could not be found. Return to the Aromis homepage.">

    <link rel="icon" href="Images/logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f8f6f2;
            color:#222;
        }

        .error-container{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:40px;
        }

        .error-container img{
            width:120px;
            margin-bottom:30px;
        }

        .error-code{
            font-size:90px;
            font-weight:700;
            color:#c9a46b;
            margin:0;
        }

        .error-title{
            font-size:36px;
            margin:20px 0 10px;
        }

        .error-text{
            max-width:550px;
            font-size:18px;
            line-height:1.7;
            color:#666;
            margin-bottom:40px;
        }

        .home-btn{
            display:inline-block;
            padding:15px 35px;
            background:#111;
            color:#fff;
            text-decoration:none;
            letter-spacing:1px;
            transition:.3s;
        }

        .home-btn:hover{
            background:#c9a46b;
            color:#fff;
        }
    </style>

</head>

<body>

<div class="error-container">

    <img src="Images/logo.png" alt="Aromis Logo">

    <h1 class="error-code">404</h1>

    <h2 class="error-title">Page Not Found</h2>

    <p class="error-text">
        The page you're looking for doesn't exist, has been moved, or the URL may be incorrect.
    </p>

    <a href="https://aromis.in/" class="home-btn">
        Return to Homepage
    </a>

</div>

</body>
</html>
